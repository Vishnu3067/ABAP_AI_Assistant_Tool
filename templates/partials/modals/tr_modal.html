  <!-- ===================== TR SEQUENCING MODAL ===================== -->
  <div class="modal-backdrop hidden" id="trModal">
    <div class="modal">
      <h2>&#128640; TR Sequencing Analyser</h2>
      <p class="modal-subtitle">Check if all dependent TRs have been released to the target system.</p>

      <p style="margin:0 0 14px 0;padding:8px 10px;background:#e3f2fd;border-left:3px solid #1565c0;border-radius:4px;font-size:11.5px;color:#1a237e;line-height:1.5;">
        <strong>&#8505;&#65039; TR dependency API is on S59 only</strong> &mdash; the TR sequencing OData API is currently deployed on <strong>S59</strong>.
        Once the API is replicated to other systems, cross-system TR dependency checks will be available here.
      </p>

      <div class="form-group">
        <label for="trNumber">TR Number</label>
        <input type="text" id="trNumber" placeholder="e.g. D59K950005" autocomplete="off" style="text-transform:uppercase" />
      </div>

      <div class="form-group">
        <label for="trDestSystem">Destination System</label>
        <select id="trDestSystem">
          <option value="" disabled selected>— Select system —</option>
        </select>
      </div>

      <p class="error-msg" id="trError"></p>

      <div class="modal-actions">
        <button class="btn btn-secondary" id="trCancelBtn">Cancel</button>
        <button class="btn btn-primary" id="trSubmitBtn">&#128640; Analyse</button>
      </div>
    </div>
  </div>
